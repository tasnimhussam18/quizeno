<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Quizeno</title>
    <style>
        body { overflow: hidden; height: 100vh; display: grid; grid-template-rows: 64px 1fr; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-white border-b px-4 md:px-8 grid grid-cols-3 items-center z-20">
        <div class="text-xl font-black text-indigo-900 tracking-tighter">Quiz<span class="text-indigo-400">eno</span></div>
        <div class="flex justify-center items-center gap-1">
            <div id="timerDisplay" class="grid grid-cols-[repeat(2,min-content)_auto_repeat(2,min-content)] gap-0.5 items-center">
                <span class="bg-indigo-50 border border-indigo-100 w-6 h-8 flex items-center justify-center rounded text-sm font-bold text-indigo-900 timer-digit">0</span>
                <span class="bg-indigo-50 border border-indigo-100 w-6 h-8 flex items-center justify-center rounded text-sm font-bold text-indigo-900 timer-digit">0</span>
                <span class="text-indigo-900 font-bold px-0.5">:</span>
                <span class="bg-indigo-50 border border-indigo-100 w-6 h-8 flex items-center justify-center rounded text-sm font-bold text-indigo-900 timer-digit">0</span>
                <span class="bg-indigo-50 border border-indigo-100 w-6 h-8 flex items-center justify-center rounded text-sm font-bold text-indigo-900 timer-digit">0</span>
            </div>
        </div>
        <div class="text-right text-[10px] font-black text-indigo-900/40 uppercase" id="userNameDisplay">Student</div>
    </header>

    <div class="grid lg:grid-cols-[1fr_300px] overflow-hidden">
        <main class="grid grid-rows-[1fr_auto] p-4 md:p-8 overflow-hidden items-start">
            <div class="max-w-3xl w-full mx-auto">
                <h2 id="questionText" class="text-base md:text-xl font-bold text-slate-800 mb-4 md:mb-8 leading-snug">Loading...</h2>
                <div id="optionsWrapper" class="grid gap-2 md:gap-3"></div>
            </div>

            <div class="grid grid-cols-2 items-center pt-4 border-t max-w-3xl w-full mx-auto mt-8 bg-slate-50">
                <div class="grid grid-cols-[auto_1fr] items-center gap-2">
                    <button id="bookmarkBtn" class="p-1.5 bg-slate-100 rounded-lg text-indigo-900 w-fit cursor-pointer">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
                    </button>
                    <span id="progressStep" class="text-xs font-bold text-slate-400">1 / 10</span>
                </div>
                <div class="flex gap-2 justify-end">
                    <button id="prevBtn" class="px-4 py-2 text-xs font-bold border border-indigo-900 text-indigo-900 rounded-lg">Back</button>
                    <button id="nextBtn" class="px-6 py-2 text-xs font-bold bg-indigo-900 text-white rounded-lg shadow-md">Next</button>
                </div>
            </div>
        </main>

        <aside class="bg-indigo-50/40 border-l border-indigo-100 p-4 md:p-6 grid grid-rows-[auto_1fr_auto]">
            <h3 class="text-xs font-black text-indigo-900/40 uppercase tracking-widest mb-4">Questions Progress</h3>
            <div id="sidebarGrid" class="grid grid-cols-5 sm:grid-cols-10 lg:grid-cols-4 gap-2 content-start overflow-y-auto pr-1"></div>
        </aside>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
