<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Quizeno</title>
    <style>
        html, body { overflow: hidden; height: 100%; margin: 0; padding: 0; }
        .hidden-form { display: none; }
        .active-tab { border-bottom: 2px solid #4338ca; color: #4338ca !important; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center p-6">
    <div class="absolute top-10 left-10 w-32 h-32 bg-indigo-100 rounded-full blur-3xl opacity-60"></div>
    
    <div class="w-full max-w-[350px] bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] border border-white p-8 relative z-10">
        <div class="text-center mb-6">
            <div class="text-3xl font-black text-indigo-900 tracking-tighter mb-1">quiz<span class="text-indigo-400">eno</span></div>
            <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em]">Student Portal</p>
        </div>

        <div class="flex justify-around mb-8 border-b border-slate-100">
            <button id="tabLogin" class="pb-2 text-[10px] font-black uppercase tracking-widest text-slate-400 active-tab transition-all cursor-pointer">Login</button>
            <button id="tabSignup" class="pb-2 text-[10px] font-black uppercase tracking-widest text-slate-400 transition-all cursor-pointer">Sign Up</button>
        </div>

        <form id="loginForm" class="space-y-4">
            <div class="space-y-1">
                <label class="block text-[10px] font-black text-indigo-900/50 uppercase tracking-widest ml-1">Username</label>
                <input type="text" id="loginUser" required class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-indigo-400">
            </div>
            <div class="space-y-1">
                <label class="block text-[10px] font-black text-indigo-900/50 uppercase tracking-widest ml-1">Email</label>
                <input type="email" id="loginEmail" required class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-indigo-400">
            </div>
            <div class="space-y-1">
                <label class="block text-[10px] font-black text-indigo-900/50 uppercase tracking-widest ml-1">Password</label>
                <input type="password" id="loginPass" required class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-indigo-400">
            </div>
            <span id="loginError" class="block text-[10px] text-red-500 font-bold ml-1"></span>
            <button type="submit" class="w-full py-4 bg-indigo-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-indigo-800 transition-all">Login Now</button>
        </form>

        <form id="signupForm" class="space-y-4 hidden-form">
            <div class="space-y-1">
                <label class="block text-[10px] font-black text-indigo-900/50 uppercase tracking-widest ml-1">New Username</label>
                <input type="text" id="regUser" required class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-indigo-400">
            </div>
            <div class="space-y-1">
                <label class="block text-[10px] font-black text-indigo-900/50 uppercase tracking-widest ml-1">Email Address</label>
                <input type="email" id="regEmail" required class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-indigo-400">
            </div>
            <div class="space-y-1">
                <label class="block text-[10px] font-black text-indigo-900/50 uppercase tracking-widest ml-1">New Password</label>
                <input type="password" id="regPass" required class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-indigo-400">
            </div>
            <button type="submit" class="w-full py-4 bg-indigo-400 text-white rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-indigo-500 transition-all">Create Account</button>
        </form>
    </div>

<script>
  // Guard
(function () {
    var users = JSON.parse(localStorage.getItem('quiz_users')) || [];
    var currentUser = sessionStorage.getItem('currentUser');
    var userRecord = users.find(function(u) { return u.username === currentUser; });

    // stay in quiz
    if (sessionStorage.getItem('quizActive') === 'true') {
        window.location.replace('quiz.html');
        return;
    }

    // Not logged in stay on login normally
    if (sessionStorage.getItem('loggedIn') !== 'true') return;

    // Logged in + finished -> go to their result
    if (userRecord && userRecord.hasFinished) {
        var score = userRecord.score || 0;
        window.location.replace(score >= 5 ? 'success.html' : 'failed.html');
        return;
    }

    // Logged in and not finished go back to quiz
    window.location.replace('quiz.html');
})();

var loginForm = document.getElementById('loginForm');
var signupForm = document.getElementById('signupForm');
var loginErr = document.getElementById('loginError');

// Tab Switching
document.getElementById('tabLogin').onclick = function() {
    loginForm.classList.remove('hidden-form');
    signupForm.classList.add('hidden-form');
    document.getElementById('tabLogin').classList.add('active-tab');
    document.getElementById('tabSignup').classList.remove('active-tab');
};

document.getElementById('tabSignup').onclick = function() {
    signupForm.classList.remove('hidden-form');
    loginForm.classList.add('hidden-form');
    document.getElementById('tabSignup').classList.add('active-tab');
    document.getElementById('tabLogin').classList.remove('active-tab');
};

// Registration
signupForm.onsubmit = function(e) {
    e.preventDefault();
    var user = document.getElementById('regUser').value.trim();
    var email = document.getElementById('regEmail').value.trim().toLowerCase();
    var pass = document.getElementById('regPass').value.trim();
    var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    var users = JSON.parse(localStorage.getItem('quiz_users')) || [];

    if (!/^[A-Za-z]+$/.test(user)) return alert("Username: letters only.");
    if (!emailRegex.test(email)) return alert("Invalid email.");
    if (users.find(function(u) { return u.email === email || u.username === user; })) return alert("User/Email exists.");

    users.push({ username: user, email: email, password: pass, hasFinished: false, score: 0 });
    localStorage.setItem('quiz_users', JSON.stringify(users));
    alert("Account created!");
    document.getElementById('tabLogin').click();
};

// Login
loginForm.onsubmit = function(e) {
    e.preventDefault();
    var user = document.getElementById('loginUser').value.trim();
    var email = document.getElementById('loginEmail').value.trim().toLowerCase();
    var pass = document.getElementById('loginPass').value.trim();

    var users = JSON.parse(localStorage.getItem('quiz_users')) || [];
    var foundUser = users.find(function(u) { return u.username === user && u.email === email && u.password === pass; });

    if (!foundUser) {
        loginErr.textContent = "Either email, username or password is wrong";
        return;
    }

    sessionStorage.setItem("loggedIn", "true");
    sessionStorage.setItem("currentUser", foundUser.username);
    location.replace(foundUser.hasFinished ? (foundUser.score >= 5 ? "success.html" : "failed.html") : "quiz.html");
};
</script>
</body>
</html>
