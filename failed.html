<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Result</title>
    <style>
        html, body { overflow: hidden; height: 100%; margin: 0; }
        .pop-in { animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
    <script>
     (function () {
    const users = JSON.parse(localStorage.getItem('quiz_users')) || [];
    const currentUser = sessionStorage.getItem('currentUser');
    const userRecord = users.find(u => u.username === currentUser);

    if (
        sessionStorage.getItem('loggedIn') !== 'true' ||
        !userRecord ||
        !userRecord.hasFinished ||      
        (userRecord.score || 0) >= 5   
    ) {
        window.location.replace('quiz.html'); 
    }
})();
    </script>
</head>
<body class="bg-slate-50 flex items-center justify-center p-6">
    <div class="absolute top-0 right-0 w-64 h-64 bg-red-50 rounded-full blur-3xl opacity-60"></div>
    <div class="absolute bottom-0 left-0 w-64 h-64 bg-slate-100 rounded-full blur-3xl opacity-60"></div>

    <div class="w-full max-w-[380px] bg-white rounded-[2.5rem] shadow-[0_20px_60px_rgba(0,0,0,0.08)] border border-white p-8 text-center relative z-10">
        <div class="mb-6 flex justify-center">
            <div class="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center pop-in">
                <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-black text-slate-800 mb-2 leading-tight">Better Luck Next Time!</h1>
        <p class="text-slate-400 text-sm font-medium mb-8">You did not pass the quiz this time.</p>

        <div class="bg-red-50/50 rounded-3xl p-6 mb-8 border border-red-100/50">
            <span class="block text-[10px] font-black text-red-400 uppercase tracking-[0.2em] mb-1">Final Score</span>
            <div class="text-4xl font-black text-slate-900">
                <span id="scoreResult">0</span><span class="text-xl text-slate-400" id="totalResult">/10</span>
            </div>
        </div>

        <button id="logoutBtn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-slate-100 hover:bg-slate-800 active:scale-95 transition-all flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            Logout
        </button>
    </div>

    <script>
        // display
        let users = JSON.parse(localStorage.getItem('quiz_users')) || [];
        let currentUser = sessionStorage.getItem('currentUser');
        let userRecord = users.find(u => u.username === currentUser);

        if (userRecord) {
            document.getElementById('scoreResult').textContent = userRecord.score;
        }

        // no go back
        history.pushState(null, null, location.href);
        window.onpopstate = function () { history.go(1); };

        // logout
        document.getElementById('logoutBtn').onclick = () => { 
            sessionStorage.clear(); 
            window.location.replace('login.html'); 
        };
    </script>
</body>
</html>
